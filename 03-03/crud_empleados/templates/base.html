<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} CRUD empleados {% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <!--barra de navegacion-->
    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="{{ url_for('index') }}" class="text-2xl font-bold hover:text-indigo-200">
                CRUD empleados
            </a>
            <div class="space-x-4">
                <a href="{{ url_for('index') }}" class="hover:text-indigo-200 transition">inicio</a>
                <a href="{{ url_for('crear') }}" class="bg-white text-indigo-600 px-4 py-2 rounded-lg
                hover:bg-indigo-50 transition font-semibold">nuevo empleado</a>
            </div>
        </div>
    </nav>

    <!--contenedor principal    -->
    <div class="container mx-auto px-4 py-8">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="mb-4 p-4 rounded-lg {% if category == 'success' %}
                            bg-green-100 border border-green-400 text-green-700
                            {% else %}bg-red-100 border border-red-400 text-red-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <!--pie de la pagina-->
    <footer class="bg-gray-800 text-white text-center py-4 mt-12">
        <p>sistema de gestion de empleados - Flask + SQLite3</p>
    </footer>
</body>

</html>
