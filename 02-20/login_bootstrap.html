    <!-- navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">

                    </li>

    <!-- contenedor principal -->
    <div class="container">
        <!-- contenido aqui -->
         <h1>Iniciar Sesión</h1>
        <div class="form-floating mb-3 mt-3"> <!-- input usuario -->
            <input type="text" class="form-control" id="floatingInput" placeholder="usuario">
            <label for="floatingInput">Usuario</label>
        </div>
        <div class="mb-3 form-floating"> <!-- input contraseña -->
            <input type="password" class="form-control" id="floatingPassword" placeholder="contraseña">
            <label for="floatingPassword">Contraseña</label>
        </div>
        <div class="mb-3 form-check"> <!-- checkbox recuerdame -->
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label class="form-check-label" for="exampleCheck1">Mantener Sesión Iniciada</label>
        </div>
        
        <button type="submit" class="btn btn-primary">Acceder</button>
    </div>
