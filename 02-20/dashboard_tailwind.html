<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Dashboard</title>
  </head>
  <body class="bg-gray-100 font-sans">
    <!-- Contenedor principal -->
    <div class="flex h-screen">
      <!-- Sidebar -->
      <aside class="w-64 bg-blue-700 text-white flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-blue-600">
          Mi Dashboard
        </div>
        <nav class="flex-1 p-4 space-y-2">
          <a href="#" class="block px-3 py-2 rounded hover:bg-blue-600">Inicio</a>
          <a href="#" class="block px-3 py-2 rounded hover:bg-blue-600">Reportes</a>
          <a href="#" class="block px-3 py-2 rounded hover:bg-blue-600">Usuarios</a>
          <a href="#" class="block px-3 py-2 rounded hover:bg-blue-600">Configuración</a>
        </nav>
      </aside>

      <!-- Área principal -->
      <main class="flex-1 p-6">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6">
          <h1 class="text-3xl font-bold text-gray-800">Panel de Control</h1>
          <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-500">
            Nueva acción
          </button>
        </header>

        <!-- Tarjetas -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">
            <h2 class="text-lg font-semibold text-gray-700">Usuarios activos</h2>
            <p class="text-3xl font-bold text-blue-600 mt-2">1,245</p>
          </div>
          <div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">
            <h2 class="text-lg font-semibold text-gray-700">Ventas</h2>
            <p class="text-3xl font-bold text-green-600 mt-2">$12,340</p>
          </div>
          <div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">
            <h2 class="text-lg font-semibold text-gray-700">Tickets abiertos</h2>
            <p class="text-3xl font-bold text-red-600 mt-2">87</p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
